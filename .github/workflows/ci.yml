name: ci.yml
on:
  push:
    branches: [main, entwicklung]
    paths:
      - 'services/organizer-backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, entwicklung]
    paths:
      - 'services/organizer-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test
